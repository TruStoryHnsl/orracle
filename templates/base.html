<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Orracle{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">orracle</a>
            <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
            <div class="nav-links">
                <a href="/" {% if request.path == '/' %}class="active"{% endif %}>dashboard</a>
                <a href="/pipeline" {% if '/pipeline' in request.path %}class="active"{% endif %}>pipeline</a>
                <a href="/train" {% if '/train' in request.path %}class="active"{% endif %}>train</a>
                <a href="/export" {% if '/export' in request.path %}class="active"{% endif %}>export</a>
                <a href="/compare" {% if '/compare' in request.path %}class="active"{% endif %}>compare</a>
                <a href="/forge" {% if '/forge' in request.path %}class="active"{% endif %}>forge</a>
                <a href="/machines" {% if '/machines' in request.path %}class="active"{% endif %}>machines</a>
            </div>
        </nav>
    </header>

    {% block content %}{% endblock %}

    <div class="toast-container" id="toast-container"></div>

    <script>
    function showToast(msg, type='info', duration=3000) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast ' + type;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => t.remove(), duration);
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
