{% extends "base.html" %}
{% block title %}Orracle — Pose Audit{% endblock %}

{% block content %}
<main>
    <div class="section-header">
        <h1>Pose Skeleton Audit</h1>
        <div class="flex gap-1">
            <button class="btn btn-sm" onclick="audit.loadRandom()">Random Frame</button>
            <button class="btn btn-sm" onclick="audit.loadNext()">Next</button>
            <span class="text-muted" id="frame-info"></span>
        </div>
    </div>

    <div class="card">
        <div style="position:relative;display:inline-block;max-width:100%">
            <canvas id="pose-canvas" style="max-width:100%;border:1px solid var(--border-color);border-radius:4px"></canvas>
        </div>
        <div class="flex justify-between mt-1">
            <div>
                <span class="text-muted" id="pose-stats"></span>
            </div>
            <div class="flex gap-1">
                <label style="margin:0;display:flex;align-items:center;gap:0.3rem">
                    <input type="checkbox" id="show-skeleton" checked style="width:auto" onchange="audit.redraw()"> Skeleton
                </label>
                <label style="margin:0;display:flex;align-items:center;gap:0.3rem">
                    <input type="checkbox" id="show-points" checked style="width:auto" onchange="audit.redraw()"> Points
                </label>
                <label style="margin:0;display:flex;align-items:center;gap:0.3rem">
                    <input type="checkbox" id="show-bbox" checked style="width:auto" onchange="audit.redraw()"> BBox
                </label>
                <label style="margin:0;display:flex;align-items:center;gap:0.3rem">
                    <input type="checkbox" id="show-labels" style="width:auto" onchange="audit.redraw()"> Labels
                </label>
            </div>
        </div>
    </div>

    <div class="card mt-1">
        <h3>Landmark Data</h3>
        <div class="log-viewer" id="landmark-data" style="max-height:300px;font-size:0.75rem">
            Load a frame to see landmark data
        </div>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script>
// COCO skeleton connections (YOLOv8 pose — 17 keypoints)
var POSE_CONNECTIONS = [
    [0,1],[0,2],[1,3],[2,4],       // face
    [5,6],                          // shoulders
    [5,7],[7,9],                    // left arm
    [6,8],[8,10],                   // right arm
    [5,11],[6,12],                  // torso
    [11,12],                        // hips
    [11,13],[13,15],                // left leg
    [12,14],[14,16],                // right leg
];

var LANDMARK_NAMES = [
    'nose','left_eye','right_eye','left_ear','right_ear',
    'left_shoulder','right_shoulder','left_elbow','right_elbow',
    'left_wrist','right_wrist','left_hip','right_hip',
    'left_knee','right_knee','left_ankle','right_ankle',
];

var audit = {
    currentImage: null,
    currentPose: null,
    frameIndex: 0,

    async loadRandom() {
        try {
            var resp = await fetch('/api/pose/random');
            var data = await resp.json();
            if (data.error) {
                document.getElementById('frame-info').textContent = data.error;
                return;
            }
            this.renderFrame(data);
        } catch (e) {
            document.getElementById('frame-info').textContent = 'Failed to load';
        }
    },

    async loadNext() {
        this.frameIndex++;
        try {
            var resp = await fetch('/api/pose/frame?index=' + this.frameIndex);
            var data = await resp.json();
            if (data.error) {
                document.getElementById('frame-info').textContent = data.error;
                return;
            }
            this.renderFrame(data);
        } catch (e) {
            document.getElementById('frame-info').textContent = 'Failed to load';
        }
    },

    renderFrame(data) {
        this.currentPose = data.landmarks || [];
        this.currentBbox = data.bbox || [];
        this.detectionConf = data.confidence || 0;
        var canvas = document.getElementById('pose-canvas');
        var ctx = canvas.getContext('2d');
        var img = new Image();
        var self = this;

        document.getElementById('frame-info').textContent =
            data.filename + ' (' + data.label + ')';

        var visible = data.visible_landmarks || 0;
        var statsText = visible + '/' + this.currentPose.length + ' keypoints visible';
        statsText += ', detection: ' + (data.confidence || 0).toFixed(2);
        if (data.features) {
            statsText += ', person: ' + (data.features.has_person ? 'yes' : 'no');
        }
        if (!data.mediapipe_available && !data.confidence) {
            statsText = 'Pose detector not available on this machine';
        }
        document.getElementById('pose-stats').textContent = statsText;

        // Show raw data
        var dataEl = document.getElementById('landmark-data');
        dataEl.textContent = '';
        if (this.currentPose.length > 0) {
            var lines = [];
            for (var i = 0; i < this.currentPose.length; i++) {
                var lm = this.currentPose[i];
                var name = LANDMARK_NAMES[i] || ('landmark_' + i);
                var vis = lm.visibility.toFixed(2);
                lines.push(i.toString().padStart(2) + ' ' +
                    name.padEnd(20) + ' x=' + lm.x.toFixed(3) +
                    ' y=' + lm.y.toFixed(3) + ' z=' + lm.z.toFixed(3) +
                    ' vis=' + vis);
            }
            dataEl.textContent = lines.join('\n');
        } else {
            dataEl.textContent = 'No pose detected in this frame';
        }

        img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            self.currentImage = img;
            self.redraw();
        };
        img.src = '/api/pose/image?path=' + encodeURIComponent(data.image_path);
    },

    redraw() {
        var canvas = document.getElementById('pose-canvas');
        var ctx = canvas.getContext('2d');
        if (!this.currentImage) return;

        var w = canvas.width;
        var h = canvas.height;

        ctx.drawImage(this.currentImage, 0, 0);

        var landmarks = this.currentPose;
        if (!landmarks || landmarks.length === 0) return;

        var showSkeleton = document.getElementById('show-skeleton').checked;
        var showPoints = document.getElementById('show-points').checked;
        var showBbox = document.getElementById('show-bbox').checked;
        var showLabels = document.getElementById('show-labels').checked;
        var minVis = 0.3;

        // Draw bounding box
        if (showBbox && this.currentBbox && this.currentBbox.length === 4) {
            var bx1 = this.currentBbox[0] * w;
            var by1 = this.currentBbox[1] * h;
            var bx2 = this.currentBbox[2] * w;
            var by2 = this.currentBbox[3] * h;
            ctx.strokeStyle = 'rgba(78, 205, 196, 0.7)';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 3]);
            ctx.strokeRect(bx1, by1, bx2 - bx1, by2 - by1);
            ctx.setLineDash([]);
            // Confidence label
            ctx.font = '12px monospace';
            ctx.fillStyle = 'rgba(78, 205, 196, 0.9)';
            ctx.fillText('person ' + (this.detectionConf || 0).toFixed(2), bx1 + 4, by1 - 5);
        }

        // Draw skeleton connections
        if (showSkeleton) {
            ctx.lineWidth = 2;
            for (var c = 0; c < POSE_CONNECTIONS.length; c++) {
                var a = POSE_CONNECTIONS[c][0];
                var b = POSE_CONNECTIONS[c][1];
                if (a >= landmarks.length || b >= landmarks.length) continue;
                var la = landmarks[a];
                var lb = landmarks[b];
                if (la.visibility < minVis || lb.visibility < minVis) continue;

                ctx.beginPath();
                ctx.moveTo(la.x * w, la.y * h);
                ctx.lineTo(lb.x * w, lb.y * h);

                // Color by body region (COCO 17-point)
                if (a <= 4 || b <= 4) {
                    ctx.strokeStyle = 'rgba(192, 132, 252, 0.8)'; // purple - face
                } else if ((a >= 5 && a <= 10) || (b >= 5 && b <= 10)) {
                    ctx.strokeStyle = 'rgba(78, 205, 196, 0.8)';  // teal - arms/shoulders
                } else if ((a >= 11) || (b >= 11)) {
                    ctx.strokeStyle = 'rgba(249, 226, 175, 0.8)'; // yellow - hips/legs
                } else {
                    ctx.strokeStyle = 'rgba(224, 224, 224, 0.8)';  // white
                }
                ctx.stroke();
            }
        }

        // Draw landmark points
        if (showPoints) {
            for (var i = 0; i < landmarks.length; i++) {
                var lm = landmarks[i];
                if (lm.visibility < minVis) continue;
                var x = lm.x * w;
                var y = lm.y * h;

                // Size by confidence
                var radius = 3 + lm.visibility * 3;

                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = lm.visibility > 0.7
                    ? 'rgba(166, 227, 161, 0.9)'   // green - high confidence
                    : 'rgba(249, 226, 175, 0.9)';  // yellow - lower confidence
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        // Draw labels
        if (showLabels) {
            ctx.font = '10px monospace';
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            for (var i = 0; i < landmarks.length; i++) {
                var lm = landmarks[i];
                if (lm.visibility < minVis) continue;
                var name = LANDMARK_NAMES[i] || ('lm' + i);
                ctx.fillText(name, lm.x * w + 6, lm.y * h - 4);
            }
        }
    },
};

document.addEventListener('DOMContentLoaded', function() {
    audit.loadRandom();
});
</script>
{% endblock %}
